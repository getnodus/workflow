# Claude Code — the @claude mention handler for the getnodus org.
#
# This is the single HEAVY definition. It runs two ways:
#   1. Reusable (workflow_call) — other repos call it from a tiny caller.
#   2. Direct — @claude mentions on THIS repo's own issues/PRs.
#
# Lightweight caller (per repo) — .github/workflows/claude.yml:
#   name: Claude Code
#   on:
#     issue_comment: { types: [created] }
#     pull_request_review_comment: { types: [created] }
#     issues: { types: [opened, assigned] }
#     pull_request_review: { types: [submitted] }
#   jobs:
#     claude:
#       uses: getnodus/workflow/.github/workflows/claude.yml@main
#       permissions:
#         contents: read
#         pull-requests: read
#         issues: read
#         id-token: write
#         actions: read
#       secrets:
#         CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

name: Claude Code

on:
  workflow_call:
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # The @claude mention is invoked by issue/PR/review comments. Anyone can
    # comment on a public repo, so we gate on author_association as
    # defense-in-depth on top of the action's own internal check. Only
    # already-trusted accounts (OWNER / MEMBER / COLLABORATOR) can spin Claude
    # using our org OAuth token. The gate evaluates the caller's event context,
    # so it works identically whether called as a reusable or triggered here.
    if: |
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@4d7e1f0cd85743fdc93b1c8040ab54395da024e2 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
