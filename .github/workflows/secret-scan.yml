name: Secret Scan

on:
  # Scope branch pushes to protected branches only. PRs are covered by
  # `pull_request`, so an unscoped `push:` would scan the same commits twice
  # for in-repo branches. Tags are kept (`tags: ['**']`) because a tag push has
  # no accompanying `pull_request` event, so dropping them would silently stop
  # secret scanning on release tags.
  push:
    branches:
      - main
    tags:
      - '**'
  pull_request:
  workflow_dispatch:

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Scan for secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar -xz
          sudo mv gitleaks /usr/local/bin/

      - name: Run Gitleaks
        run: gitleaks detect --source . --log-opts="HEAD~50..HEAD" --redact --exit-code 1
