# Reusable Bugbot-on-Failure trigger.
# When CI fails on a PR, posts a `cursor review` comment to kick off Cursor
# Bugbot analysis. Bugbot is a GitHub App (not an Action) — the only
# programmatic trigger is a PR comment from a real user account.
#
# Requirements:
#   - Cursor Bugbot GitHub App installed on the repo (cursor.com/dashboard).
#   - Bugbot configured to "Run only when mentioned" (avoids double-reviewing).
#   - BUGBOT_PAT org secret: a PAT from a real user with Bugbot enabled.
#     Bot-authored comments (GITHUB_TOKEN) are ignored by Bugbot for security.
#
# Caller (per repo):
#   name: Bugbot on CI Failure
#   on:
#     workflow_run:
#       workflows: ["CI"]          # <- match the repo's CI workflow `name:`
#       types: [completed]
#   jobs:
#     call:
#       uses: getnodus/workflow/.github/workflows/bugbot-on-failure.yml@main
#       secrets:
#         BUGBOT_PAT: ${{ secrets.BUGBOT_PAT }}
#
# Pass secrets EXPLICITLY (above). Do NOT use `secrets: inherit`.

name: Bugbot on CI Failure

on:
  workflow_call:
    inputs:
      allowed_authors:
        description: >-
          Space-separated PR-author logins to trigger Bugbot for, in addition
          to renovate[bot] and dependabot[bot]. Default includes the org owner.
        type: string
        default: 'fschrhunt'
    secrets:
      BUGBOT_PAT:
        required: true

jobs:
  trigger:
    # Only fires on CI failures for same-repo (non-fork) PRs from trusted authors.
    if: >-
      github.event.workflow_run.conclusion == 'failure'
      && github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Find PR and check trust gate
        id: find
        env:
          GH_TOKEN: ${{ secrets.BUGBOT_PAT }}
          REPO: ${{ github.repository }}
          WR_PRS: ${{ toJSON(github.event.workflow_run.pull_requests) }}
          EXTRA_AUTHORS: ${{ inputs.allowed_authors }}
        run: |
          set -euo pipefail

          PR_NUMBER=$(echo "$WR_PRS" | jq -r '.[0].number // empty')
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR associated with this CI run. Skipping."
            exit 0
          fi

          # Trust gate: only trigger for known authors
          allowed="renovate[bot] dependabot[bot] ${EXTRA_AUTHORS:-}"
          author=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json author --jq '.author.login')
          trusted=false
          for a in $allowed; do
            if [ "$a" = "$author" ]; then trusted=true; break; fi
          done

          if [ "$trusted" != "true" ]; then
            echo "PR #$PR_NUMBER author ($author) not in trust list. Skipping."
            exit 0
          fi

          # Check if Bugbot already reviewed this PR recently (avoid spam)
          recent=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json comments \
            --jq '[.comments[] | select(.author.login == "cursor[bot]" or .body == "cursor review") | select(.createdAt > (now - 3600 | todate))] | length' 2>/dev/null || echo "0")
          if [ "$recent" -gt 0 ]; then
            echo "Bugbot already active on PR #$PR_NUMBER in the last hour. Skipping."
            exit 0
          fi

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Trigger Bugbot review
        if: steps.find.outputs.pr_number
        env:
          GH_TOKEN: ${{ secrets.BUGBOT_PAT }}
        run: |
          gh pr comment ${{ steps.find.outputs.pr_number }} \
            --repo ${{ github.repository }} \
            --body "cursor review

          _Automated: CI failed — requesting Bugbot review to help identify issues._"
